<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changelog — MomAI</title>
    <meta name="description" content="Acompanhe todas as atualizações e mudanças da MomAI.">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,slnt,wdth,wght,ROND@8..144,-10..0,25..150,400..500,0..100&family=Google+Sans+Text:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <!-- Background Effects -->
    <div class="bg-effects">
        <div class="bg-stars" id="bgStars"></div>
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>
        <div class="bg-glow bg-glow-3"></div>
    </div>

    <script>
        const bgStars = document.getElementById('bgStars');
        const starCount = 80;
        
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            const is4Point = Math.random() > 0.85;
            const size = Math.random() * 3 + 1;
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const delay = Math.random() * 5;
            const duration = Math.random() * 3 + 2;
            
            star.className = is4Point ? 'star star-4pt' : 'star';
            if (!is4Point) {
                const colors = ['star-gold', 'star-pink', 'star-blue'];
                star.classList.add(colors[Math.floor(Math.random() * colors.length)]);
            }
            
            star.style.cssText = `
                left: ${x}%;
                top: ${y}%;
                width: ${size}px;
                height: ${size}px;
                animation-delay: ${delay}s;
                animation-duration: ${duration}s;
            `;
            
            bgStars.appendChild(star);
        }
    </script>

    <!-- Navbar -->
    <nav>
        <div class="nav-left">
            <a href="index.html" class="logo">
                <img src="icon.png" alt="MomAI">
                MomAI
            </a>
            <ul class="nav-links">
                <li><a href="blog.html">Blog</a></li>
                <li><a href="changelog.html">Changelog</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
            <a href="https://github.com/WesleyQDev/MomAI-App/releases/latest" class="btn-primary btn-download" style="padding: 0.45rem 0.9rem; font-size: 0.8rem; background: rgba(255,255,255,0.1); color: var(--text);">
                <span>Download</span>
                <span class="version-badge" id="navVersion" style="margin-left: 6px; font-size: 0.7rem; opacity: 0.7;"></span>
            </a>
            <button class="menu-toggle" aria-label="Menu" id="menuToggle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
    </nav>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.querySelector('.nav-links');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            const icon = menuToggle.querySelector('svg');
            if (navLinks.classList.contains('active')) {
                icon.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>';
            } else {
                icon.innerHTML = '<line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>';
            }
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                menuToggle.querySelector('svg').innerHTML = '<line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>';
            });
        });

        async function updateDownloadLinks() {
            const repo = "WesleyQDev/MomAI-App";
            const platform = navigator.platform?.toLowerCase() || "";
            const isLinux = platform.includes('linux') || navigator.userAgent.toLowerCase().includes('linux');
            const storageKey = isLinux ? "momai_latest_linux" : "momai_latest_win";
            const versionKey = "momai_latest_version";
            
            const cachedUrl = sessionStorage.getItem(storageKey);
            const cachedVersion = sessionStorage.getItem(versionKey);
            
            if (cachedUrl && cachedVersion) {
                applyDownloadUrl(cachedUrl, isLinux);
                displayVersion(cachedVersion);
                return;
            }

            try {
                let res = await fetch(`https://api.github.com/repos/${repo}/releases/latest`);
                let data;

                if (res.ok) {
                    data = await res.json();
                } else if (res.status === 404) {
                    const resList = await fetch(`https://api.github.com/repos/${repo}/releases`);
                    if (resList.ok) {
                        const list = await resList.json();
                        if (list && list.length > 0) data = list[0];
                    }
                }

                if (data && data.assets) {
                    let asset;
                    if (isLinux) {
                        asset = data.assets.find(a => a.name.endsWith('.AppImage')) || data.assets.find(a => a.name.endsWith('.deb'));
                    } else {
                        asset = data.assets.find(a => a.name.endsWith('.exe'));
                    }

                    if (asset) {
                        const downloadUrl = asset.browser_download_url;
                        const version = data.tag_name || data.name || '';
                        sessionStorage.setItem(storageKey, downloadUrl);
                        sessionStorage.setItem(versionKey, version);
                        applyDownloadUrl(downloadUrl, isLinux);
                        displayVersion(version);
                    }
                }
            } catch (err) {
                console.error("Erro ao buscar release do GitHub:", err);
            }
        }

        function displayVersion(version) {
            const cleanVersion = version.replace(/^v/, '');
            const navVersion = document.getElementById('navVersion');
            if (navVersion && cleanVersion) {
                navVersion.textContent = `v${cleanVersion}`;
            }
        }

        function applyDownloadUrl(url, isLinux) {
            document.querySelectorAll('.btn-download').forEach(el => {
                el.href = url;
            });
        }

        updateDownloadLinks();
    </script>

    <!-- Changelog Content -->
    <div class="changelog-content" id="changelog-container">
        <div class="changelog-header">
            <h1>Changelog</h1>
            <p>Acompanhe todas as atualizações da MomAI</p>
        </div>
        <p style="text-align:center; padding: 4rem; color: var(--text-tertiary);">Sincronizando registros...</p>
    </div>

                </svg>
                GitHub
            </a>
            <a href="https://www.youtube.com/@WesleyDev" target="_blank">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>

            <a href="https://github.com/WesleyQDev/MomAI" target="_blank">Repositório</a>
            <a href="changelog.html">Changelog</a>
        </div>
        <div class="footer-copyright">
            Desenvolvido com foco em privacidade
        </div>
    </footer>

    <script>
        async function loadChangelog() {
            const container = document.getElementById('changelog-container');
            
            try {
                const res = await fetch('CHANGELOG.md');
                if (!res.ok) throw new Error('CHANGELOG.md não encontrado');
                
                const text = await res.text();
                container.innerHTML = `<div class="md-content">${marked.parse(text)}</div>`;
            } catch (err) {
                container.innerHTML += `<p style="text-align:center;color:var(--text-tertiary);padding:2rem;">Erro ao carregar changelog: ${err.message}</p>`;
            }
        }

        loadChangelog();
    </script>
</body>
