<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MomAI | Inteligência Artificial Local</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #8B5CF6;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --bg: #030014;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text: #F8FAFC;
            --text-muted: #94A3B8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Premium Background */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .glow {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Nav */
        nav {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent);
        }

        /* Hero */
        section.hero {
            height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-bottom: 5rem;
        }

        .badge {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 2rem;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 1.5rem;
            background: linear-gradient(to bottom, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideUp 1s ease-out;
        }

        p.subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 3rem;
            font-weight: 300;
            animation: slideUp 1.2s ease-out;
        }

        /* Button */
        .btn-download {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 1.2rem 2.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 10px 40px -10px var(--accent-glow);
            border: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 1.4s ease-out;
        }

        .btn-download:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px -10px var(--accent-glow);
            background: #9d71ff;
        }

        .btn-download svg {
            width: 20px;
            height: 20px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        footer {
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            p.subtitle { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow"></div>

    <div class="container">
        <nav>
            <div class="logo">MOM<span>AI</span></div>
            <div style="font-size: 0.7rem; opacity: 0.3; font-weight: 600; letter-spacing: 1px;">V0.1.0 ENTERPRISE</div>
        </nav>

        <section class="hero">
            <div class="badge">100% Local & Privada</div>
            <h1>Sua Assistente<br>de Inteligência Local</h1>
            <p class="subtitle">A MomAI é uma assistente pessoal poderosa que roda inteiramente no seu computador. Sem nuvem, sem assinaturas, privacidade absoluta.</p>
            
            <a href="https://drive.usercontent.google.com/download?id=1jytH39lJ4crWNYKAnsV8f60YFrLjunWQ&export=download&authuser=0&confirm=t&uuid=c415dca4-036a-45a1-8dc7-7ad9254a4c7c&at=APcXIO1l0KOOWEI5vzxfZD1_YlSF:1771334762568" class="btn-download">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Baixar MomAI v0.1.0
            </a>
        </section>
    </div>

    <footer>
        © 2026 MomAI Ecosystem • Desenvolvido com foco em privacidade
    </footer>
</body>
</html>
