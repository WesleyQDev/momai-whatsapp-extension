name: Release WhatsApp Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout extension
        uses: actions/checkout@v4
        with:
          path: extension

      # The extension UI is built with esbuild aliases that point into the MomAI
      # renderer source (momai:registry, momai:api, momai:image-viewer, etc.).
      # build.mjs resolves those aliases relative to
      # apps/momai/scripts/skills/packaged/whatsapp/, so we need the extension
      # inside the MomAI tree to build correctly.
      - name: Checkout MomAI source
        uses: actions/checkout@v4
        with:
          repository: WesleyQDev/MomAI
          path: momai
          token: ${{ secrets.MOMAI_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Place extension into MomAI tree
        shell: pwsh
        run: |
          $dest = "momai\apps\momai\scripts\skills\packaged\whatsapp"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Get-ChildItem -Path extension -Exclude @('.git') | Copy-Item -Destination $dest -Recurse -Force

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        shell: pwsh
        working-directory: momai\apps\momai\scripts\skills\packaged\whatsapp
        run: pnpm install

      - name: Build UI
        shell: pwsh
        working-directory: momai\apps\momai\scripts\skills\packaged\whatsapp
        run: pnpm build

      - name: Create release zip
        shell: pwsh
        working-directory: momai\apps\momai\scripts\skills\packaged\whatsapp
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $version = $pkg.version
          $zipName = "momai-whatsapp-extension-v$version.zip"
          $items = @(
            'manifest.json',
            'SKILL.md',
            'package.json',
            'runtime.js',
            'background-worker.js',
            'baileys-cred-migration.js',
            'fs-permissions.js',
            'secure-storage-bridge.js',
            'icon.svg',
            'dist',
            'locales',
            'node_modules'
          )
          Compress-Archive -Path $items -DestinationPath $zipName -Force
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-extension-${{ github.run_id }}
          path: momai/apps/momai/scripts/skills/packaged/whatsapp/${{ env.ZIP_NAME }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: momai/apps/momai/scripts/skills/packaged/whatsapp/${{ env.ZIP_NAME }}
          generate_release_notes: true
