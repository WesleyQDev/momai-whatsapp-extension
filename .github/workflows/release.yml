name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Windows
        run: pnpm --filter desktop build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-artifacts
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.yml
            apps/desktop/dist/*.blockmap
          if-no-files-found: error
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: [build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-artifacts
          path: dist/win

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: List release files
        run: |
          echo "=== Windows ==="
          find dist/win -type f | head -20

      - name: Initialize public repo if empty
        run: |
          set -e
          REPO="WesleyQDev/MomAI-App"

          # Verifica se o repo tem commits checando a API
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/commits?per_page=1")

          if [ "$STATUS" = "409" ] || [ "$STATUS" = "404" ]; then
            echo "📝 Repositório vazio. Inicializando com README..."
            RESPONSE=$(curl -s -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/contents/README.md" \
              -d '{"message":"Initial commit","content":"IyBNb21BSSBEb3dubG9hZHMKClJlcG9zaXTDs3JpbyBkZSBkaXN0cmlidWnDp8OjbyBkbyBNb21BSS4="}')
            
            # Verifica se o upload foi bem sucedido
            if echo "$RESPONSE" | grep -q '"content"'; then
              echo "✅ README criado com sucesso!"
            else
              echo "❌ Falha ao criar README: $RESPONSE"
              exit 1
            fi
            sleep 3
          elif [ "$STATUS" = "200" ]; then
            echo "✅ Repositório já inicializado."
          else
            echo "❌ Status inesperado: $STATUS"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Create Release on Public Repo
        run: |
          set -e
          VERSION="${{ steps.version.outputs.VERSION }}"
          REPO="WesleyQDev/MomAI-App"

          # Coleta arquivos de forma mais robusta
          FILES=$(find dist/win -type f -print | tr '\n' ' ')

          if [ -z "$FILES" ]; then
            echo "❌ Nenhum arquivo encontrado em dist/win!"
            exit 1
          fi

          echo "📦 Criando release $VERSION no repo $REPO..."
          echo "📁 Arquivos: $FILES"

          # Cria o release e faz upload dos arquivos
          gh release create "$VERSION" \
            --repo "$REPO" \
            --title "MomAI $VERSION" \
            --latest \
            dist/win/*
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
