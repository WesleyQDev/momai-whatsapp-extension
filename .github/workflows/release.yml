  release:
    name: Create GitHub Release
    needs: [build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-artifacts
          path: dist/win

#      - name: Download Linux artifacts
#        uses: actions/download-artifact@v4
#        with:
#          name: linux-artifacts
#          path: dist/linux

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: List release files
        run: |
          echo "=== Windows ==="
          find dist/win -type f | head -20
          echo "=== Linux ==="
          find dist/linux -type f | head -20

      - name: Initialize public repo if empty
        run: |
          REPO="WesleyQDev/MomAI-App"
          # Verifica se o repo tem commits checando a API
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/commits?per_page=1")
          
          if [ "$STATUS" = "409" ] || [ "$STATUS" = "404" ]; then
            echo "📝 Repositório vazio. Inicializando com README..."
            curl -s -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/contents/README.md" \
              -d '{"message":"Initial commit","content":"IyBNb21BSSBEb3dubG9hZHMKClJlcG9zaXTDs3JpbyBkZSBkaXN0cmlidWnDp8OjbyBkbyBNb21BSS4="}'
            echo "✅ README criado com sucesso!"
            sleep 3
          else
            echo "✅ Repositório já inicializado."
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Create Release on Public Repo
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          REPO="WesleyQDev/MomAI-App"

          # Coleta todos os arquivos para upload
          FILES=""
          for f in dist/win/*.exe dist/win/latest.yml; do
            [ -f "$f" ] && FILES="$FILES $f"
          done

          echo "📦 Criando release $VERSION no repo $REPO..."
          echo "📁 Arquivos: $FILES"

          # Cria o release e faz upload dos arquivos
          gh release create "$VERSION" \
            --repo "$REPO" \
            --title "MomAI $VERSION" \
            --latest \
            $FILES
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
