name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows
        run: pnpm --filter desktop build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-artifacts
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.yml
          if-no-files-found: error
          retention-days: 5

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Build Linux
        run: pnpm --filter desktop build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
            apps/desktop/dist/*.yml
          if-no-files-found: warn
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: [build-win, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-artifacts
          path: dist/win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: dist/linux

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: List release files
        run: |
          echo "=== Windows ==="
          find dist/win -type f | head -20
          echo "=== Linux ==="
          find dist/linux -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          repository: WesleyQDev/MomAI-App
          name: MomAI ${{ steps.version.outputs.VERSION }}
          tag_name: ${{ steps.version.outputs.VERSION }}
          target_commitish: main # <--- Força vincular à branch do repo público
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') }}
          generate_release_notes: false # <--- Desativa pois os históricos são diferentes
          make_latest: true
          files: |
            dist/win/*.exe
            dist/win/latest.yml
            dist/linux/*.AppImage
            dist/linux/*.deb
            dist/linux/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
