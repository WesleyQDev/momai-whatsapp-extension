<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — MomAI</title>
    <meta name="description" content="Blog da MomAI - Novidades, atualizações e artigos.">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,slnt,wdth,wght,ROND@8..144,-10..0,25..150,400..500,0..100&family=Google+Sans+Text:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Estilos específicos do blog */
        .blog-container { max-width: 1100px; margin: 0 auto; padding: 4rem 2rem; }
        
        .blog-header {
            text-align: center;
            margin-bottom: 4rem;
        }
        
        .blog-header h1 {
            font-family: 'Google Sans Flex', sans-serif;
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .blog-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        .post-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .post-card { 
            background: var(--bg-tertiary);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--feature-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        
        .post-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border-color: rgba(138, 180, 248, 0.2);
        }

        .post-thumb {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--bg-secondary);
            overflow: hidden;
            position: relative;
        }

        .post-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .post-card:hover .post-thumb img {
            transform: scale(1.05);
        }

        .post-body {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .post-date { 
            font-size: 0.75rem; 
            color: var(--text-tertiary); 
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem; 
        }

        .post-title { 
            font-size: 1.1rem; 
            font-weight: 500; 
            margin-bottom: 0.75rem; 
            line-height: 1.4;
            color: var(--text);
        }

        .post-excerpt { 
            color: var(--text-secondary); 
            font-size: 0.875rem; 
            line-height: 1.6;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .post-footer {
            margin-top: auto;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--accent);
        }

        /* Post em Destaque (Horizontal) */
        .featured-post {
            display: flex;
            flex-direction: row;
            background: var(--bg-tertiary);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--feature-border);
            margin-bottom: 3rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .featured-post:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border-color: rgba(138, 180, 248, 0.3);
        }

        .featured-post .post-thumb {
            width: 50%;
            aspect-ratio: auto;
            min-height: 300px;
        }

        .featured-post .post-body {
            width: 50%;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .featured-post .post-title {
            font-size: 1.75rem;
            font-weight: 500;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .featured-post .post-excerpt {
            font-size: 1rem;
            -webkit-line-clamp: 4;
            line-clamp: 4;
        }

        .featured-badge {
            display: inline-block;
            background: var(--gradient-primary);
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            margin-bottom: 0.75rem;
            width: fit-content;
        }

        /* Single Post View */
        .post-view {
            max-width: 750px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .back-button { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            color: var(--text-secondary); 
            text-decoration: none; 
            font-size: 0.9rem; 
            margin-bottom: 2rem; 
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--feature-border);
            transition: all 0.2s;
        }
        
        .back-button:hover { 
            color: var(--accent); 
            border-color: var(--accent);
        }

        .post-view-header {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--feature-border);
        }

        .post-view-title {
            font-family: 'Google Sans Flex', sans-serif;
            font-size: 2.5rem;
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 0.75rem;
            letter-spacing: -1px;
            color: var(--text);
        }

        .post-content { 
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .post-content h1, .post-content h2, .post-content h3 {
            color: var(--text);
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        .post-content h2 {
            font-size: 1.5rem;
            font-weight: 500;
        }

        .post-content p { margin-bottom: 1.2rem; }

        .post-content ul, .post-content ol { 
            margin: 1.5rem 0 2rem 0; 
            padding-left: 1.5rem;
        }

        .post-content li { 
            margin-bottom: 0.5rem;
        }

        .post-content strong {
            color: var(--text);
            font-weight: 600;
        }

        .post-content img {
            max-width: 100%;
            border-radius: 12px;
            margin: 1.5rem 0;
        }

        @media (max-width: 900px) {
            .featured-post {
                flex-direction: column;
            }
            .featured-post .post-thumb {
                width: 100%;
                min-height: 200px;
                aspect-ratio: 16 / 9;
            }
            .featured-post .post-body {
                width: 100%;
                padding: 1.5rem;
            }
            .featured-post .post-title {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 768px) {
            .blog-container { padding: 2rem 1.5rem; }
            .blog-header h1 { font-size: 2rem; }
            .post-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .post-view-title { font-size: 1.8rem; }
            .post-view { padding: 0 1rem; }
        }
    </style>
</head>
<body>

    <script>
        // Generate stars
        const bgStars = document.getElementById('bgStars');
        const starCount = 80;
        
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            const is4Point = Math.random() > 0.85;
            const size = Math.random() * 3 + 1;
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const delay = Math.random() * 5;
            const duration = Math.random() * 3 + 2;
            
            star.className = is4Point ? 'star star-4pt' : 'star';
            if (!is4Point) {
                const colors = ['star-gold', 'star-pink', 'star-blue'];
                star.classList.add(colors[Math.floor(Math.random() * colors.length)]);
            }
            
            star.style.cssText = `
                left: ${x}%;
                top: ${y}%;
                width: ${size}px;
                height: ${size}px;
                animation-delay: ${delay}s;
                animation-duration: ${duration}s;
            `;
            
            bgStars.appendChild(star);
        }
    </script>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.querySelector('.nav-links');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            const icon = menuToggle.querySelector('svg');
            if (navLinks.classList.contains('active')) {
                icon.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>';
            } else {
                icon.innerHTML = '<line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>';
            }
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                menuToggle.querySelector('svg').innerHTML = '<line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>';
            });
        });

        async function updateDownloadLinks() {
            const repo = "WesleyQDev/MomAI-App";
            const platform = navigator.platform?.toLowerCase() || "";
            const isLinux = platform.includes('linux') || navigator.userAgent.toLowerCase().includes('linux');
            const storageKey = isLinux ? "momai_latest_linux" : "momai_latest_win";
            const versionKey = "momai_latest_version";
            
            const cachedUrl = sessionStorage.getItem(storageKey);
            const cachedVersion = sessionStorage.getItem(versionKey);
            
            if (cachedUrl && cachedVersion) {
                applyDownloadUrl(cachedUrl, isLinux);
                displayVersion(cachedVersion);
                return;
            }

            try {
                let res = await fetch(`https://api.github.com/repos/${repo}/releases/latest`);
                let data;

                if (res.ok) {
                    data = await res.json();
                } else if (res.status === 404) {
                    const resList = await fetch(`https://api.github.com/repos/${repo}/releases`);
                    if (resList.ok) {
                        const list = await resList.json();
                        if (list && list.length > 0) data = list[0];
                    }
                }

                if (data && data.assets) {
                    let asset;
                    if (isLinux) {
                        asset = data.assets.find(a => a.name.endsWith('.AppImage')) || data.assets.find(a => a.name.endsWith('.deb'));
                    } else {
                        asset = data.assets.find(a => a.name.endsWith('.exe'));
                    }

                    if (asset) {
                        const downloadUrl = asset.browser_download_url;
                        const version = data.tag_name || data.name || '';
                        sessionStorage.setItem(storageKey, downloadUrl);
                        sessionStorage.setItem(versionKey, version);
                        applyDownloadUrl(downloadUrl, isLinux);
                        displayVersion(version);
                    }
                }
            } catch (err) {
                console.error("Erro ao buscar release do GitHub:", err);
            }
        }

        function displayVersion(version) {
            const cleanVersion = version.replace(/^v/, '');
            const navVersion = document.getElementById('navVersion');
            if (navVersion && cleanVersion) {
                navVersion.textContent = `v${cleanVersion}`;
            }
        }

        function applyDownloadUrl(url, isLinux) {
            document.querySelectorAll('.btn-download').forEach(el => {
                el.href = url;
                const span = el.querySelector('span');
                if (span) {
                    span.textContent = isLinux ? 'Download para Linux' : 'Download para Windows';
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateDownloadLinks();
        });
    </script>

    <script>
        const container = document.getElementById('content');
        let postsData = [];

        // Função para extrair Frontmatter
        function parseFrontmatter(text) {
            const frontmatter = {};
            if (text.startsWith('---')) {
                const endIndex = text.indexOf('---', 3);
                if (endIndex !== -1) {
                    const frontBlock = text.slice(3, endIndex).trim();
                    const lines = frontBlock.split('\n');
                    lines.forEach(line => {
                        const colonIndex = line.indexOf(':');
                        if (colonIndex !== -1) {
                            const key = line.slice(0, colonIndex).trim();
                            let value = line.slice(colonIndex + 1).trim();
                            if ((value.startsWith('"') && value.endsWith('"')) || 
                                (value.startsWith("'") && value.endsWith("'"))) {
                                value = value.slice(1, -1);
                            }
                            frontmatter[key] = value;
                        }
                    });
                }
            }
            return frontmatter;
        }

        function removeFrontmatter(text) {
            if (text.startsWith('---')) {
                const endIndex = text.indexOf('---', 3);
                if (endIndex !== -1) {
                    return text.slice(endIndex + 3).trim();
                }
            }
            return text;
        }

        // Carrega a lista de posts
        async function loadPosts() {
            try {
                const res = await fetch(`posts/posts.json?t=${new Date().getTime()}`);
                if (!res.ok) throw new Error('posts.json não encontrado');
                const data = await res.json();
                const postFiles = data.posts || [];
                
                if (postFiles.length === 0) {
                    container.innerHTML += '<p style="text-align:center;color:var(--text-tertiary);padding:4rem;">Nenhum post encontrado.</p>';
                    return;
                }

                // Carregar todos os posts
                postsData = await Promise.all(postFiles.map(async (file) => {
                    try {
                        const res = await fetch(`posts/${file}?t=${new Date().getTime()}`);
                        if (!res.ok) return null;
                        const md = await res.text();
                        
                        const frontmatter = parseFrontmatter(md);
                        const content = removeFrontmatter(md);
                        
                        return {
                            id: file.replace('.md', ''),
                            file: file,
                            title: frontmatter.title || file.replace('.md', ''),
                            date: frontmatter.date || '',
                            excerpt: frontmatter.excerpt || '',
                            image: frontmatter.image || '',
                            content: content
                        };
                    } catch (err) {
                        return null;
                    }
                }));

                postsData = postsData.filter(p => p !== null);
                renderList();
            } catch (err) {
                container.innerHTML += `<p style="text-align:center;color:var(--text-tertiary);padding:4rem;">Erro ao carregar posts: ${err.message}</p>`;
            }
        }

        // Renderiza a lista de posts
        function renderList() {
            if (postsData.length === 0) return;
            
            // Separa o primeiro post (destaque) dos demais
            const featuredPost = postsData[0];
            const otherPosts = postsData.slice(1);
            
            // Renderiza o post em destaque (horizontal)
            const featuredHTML = `
                <article class="featured-post" onclick="openPost('${featuredPost.id}')">
                    <div class="post-thumb">
                        ${featuredPost.image ? `<img src="${featuredPost.image}" alt="${featuredPost.title}" onerror="this.style.display='none'">` : ''}
                    </div>
                    <div class="post-body">
                        <span class="featured-badge">Em Destaque</span>
                        <div class="post-date">${featuredPost.date}</div>
                        <h2 class="post-title">${featuredPost.title}</h2>
                        <p class="post-excerpt">${featuredPost.excerpt || 'Clique para ler mais...'}</p>
                        <div class="post-footer">Ler mais →</div>
                    </div>
                </article>
            `;
            
            // Renderiza os outros posts no grid
            const postsHTML = otherPosts.map(post => `
                <article class="post-card" onclick="openPost('${post.id}')">
                    <div class="post-thumb">
                        ${post.image ? `<img src="${post.image}" alt="${post.title}" onerror="this.style.display='none'">` : ''}
                    </div>
                    <div class="post-body">
                        <div class="post-date">${post.date}</div>
                        <h2 class="post-title">${post.title}</h2>
                        <p class="post-excerpt">${post.excerpt || 'Clique para ler mais...'}</p>
                        <div class="post-footer">Ler mais →</div>
                    </div>
                </article>
            `).join('');

            container.innerHTML = `
                <div class="blog-header">
                    <h1>Blog</h1>
                    <p>Fique por dentro das últimas novidades da MomAI</p>
                </div>
                ${featuredHTML}
                <div class="post-grid">${postsHTML}</div>
            `;
        }

        // Abre um post específico
        function openPost(id) {
            const post = postsData.find(p => p.id === id);
            if (!post) return;

            const contentHtml = marked.parse(post.content);
            
            container.innerHTML = `
                <div class="post-view">
                    <a href="javascript:renderList()" class="back-button">← Voltar para todos os posts</a>
                    <div class="post-view-header">
                        <div class="post-date">${post.date || ''}</div>
                        <h1 class="post-view-title">${post.title}</h1>
                    </div>
                    <div class="post-content">${contentHtml}</div>
                </div>
            `;
            window.scrollTo(0, 0);
        }

        loadPosts();
    </script>
